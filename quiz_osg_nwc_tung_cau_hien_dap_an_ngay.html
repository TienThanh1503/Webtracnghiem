<!doctype html>
<html lang="vi">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz OSG + NWC - Từng câu</title>
    <style>
      :root {
        --bg1: #0f172a;
        --bg2: #1e1b4b;
        --bg3: #111827;
        --card: rgba(255, 255, 255, 0.1);
        --card-2: rgba(255, 255, 255, 0.15);
        --border: rgba(255, 255, 255, 0.16);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #8b5cf6;
        --accent2: #22d3ee;
        --good: #22c55e;
        --bad: #ef4444;
        --warn: #f59e0b;
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
        --radius: 28px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(34, 211, 238, 0.2),
            transparent 28%
          ),
          radial-gradient(
            circle at top right,
            rgba(139, 92, 246, 0.2),
            transparent 32%
          ),
          linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
      }
      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 16px 56px;
      }
      .hero {
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px);
        background: linear-gradient(
          180deg,
          rgba(15, 23, 42, 0.94),
          rgba(15, 23, 42, 0.8)
        );
        border: 1px solid var(--border);
        border-radius: 26px;
        padding: 18px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
      }
      .hero-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }
      .logo {
        width: 58px;
        height: 58px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 27px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow: 0 14px 30px rgba(139, 92, 246, 0.34);
        flex: 0 0 auto;
      }
      h1 {
        margin: 0 0 5px;
        font-size: clamp(1.25rem, 2vw, 2rem);
      }
      .sub {
        color: var(--muted);
        font-size: 0.96rem;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        min-width: min(100%, 470px);
      }
      .stat {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 18px;
        padding: 12px 10px;
        text-align: center;
      }
      .stat b {
        display: block;
        font-size: 1.15rem;
        margin-bottom: 4px;
      }
      .controls {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr 0.8fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 14px;
      }
      input[type="search"],
      select {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 0.98rem;
      }
      select option {
        color: #111827;
      }
      .bar-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 8px;
      }
      .progress {
        height: 14px;
        width: 100%;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid var(--border);
      }
      .progress > div {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        transition: width 0.22s ease;
      }
      .stage {
        display: grid;
        gap: 16px;
      }
      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.06)
        );
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
        animation: fadeUp 0.22s ease;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 0.86rem;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.08);
      }
      .badge.osg {
        background: rgba(59, 130, 246, 0.18);
      }
      .badge.nwc {
        background: rgba(236, 72, 153, 0.18);
      }
      .qtext {
        font-size: 1.12rem;
        line-height: 1.65;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .helper {
        color: #fde68a;
        font-size: 0.95rem;
        margin-bottom: 14px;
      }
      .qimage {
        width: 100%;
        max-width: 580px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: white;
        display: block;
        margin: 0 0 16px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }
      .options {
        display: grid;
        gap: 12px;
      }
      .opt {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 14px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        cursor: pointer;
        transition: 0.18s ease;
      }
      .opt:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.22);
      }
      .opt.disabled {
        opacity: 0.78;
        cursor: default;
      }
      .opt input {
        transform: translateY(2px);
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
        flex: 0 0 auto;
      }
      .opt-letter {
        min-width: 34px;
        height: 34px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.13);
      }
      .opt-text {
        line-height: 1.55;
        color: #f1f5f9;
      }
      .opt.correct {
        border-color: rgba(34, 197, 94, 0.55);
        background: rgba(34, 197, 94, 0.12);
      }
      .opt.wrong {
        border-color: rgba(239, 68, 68, 0.45);
        background: rgba(239, 68, 68, 0.12);
      }
      .result {
        margin-top: 16px;
        padding: 15px 16px;
        border-radius: 18px;
        display: none;
        border: 1px solid var(--border);
        line-height: 1.6;
      }
      .result.show {
        display: block;
      }
      .result.correct {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.4);
      }
      .result.wrong {
        background: rgba(239, 68, 68, 0.12);
        border-color: rgba(239, 68, 68, 0.34);
      }
      .mini-note {
        color: var(--muted);
        margin-top: 10px;
        font-size: 0.93rem;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
      button {
        border: 0;
        cursor: pointer;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 800;
        transition:
          transform 0.18s ease,
          opacity 0.18s ease,
          background 0.18s ease;
      }
      button:hover {
        transform: translateY(-1px);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .primary {
        background: linear-gradient(135deg, var(--accent), #7c3aed);
        color: white;
      }
      .secondary {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .danger {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        color: white;
      }
      .empty {
        padding: 34px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px dashed rgba(255, 255, 255, 0.22);
        text-align: center;
        color: var(--muted);
      }
      .footer-note {
        margin-top: 14px;
        text-align: center;
        color: var(--muted);
        font-size: 0.94rem;
      }
      @media (max-width: 900px) {
        .hero-head,
        .controls {
          grid-template-columns: 1fr;
        }
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          min-width: 0;
          width: 100%;
        }
        .controls {
          display: grid;
        }
      }
      @media (max-width: 640px) {
        .wrap {
          padding: 14px 12px 40px;
        }
        .hero {
          padding: 14px;
          border-radius: 22px;
        }
        .card {
          padding: 16px;
          border-radius: 20px;
        }
        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .nav button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="hero">
        <div class="hero-head">
          <div class="brand">
            <div class="logo">⚡</div>
            <div>
              <h1>Web trắc nghiệm OSG + NWC</h1>
              <div class="sub">
                Mỗi lần chỉ hiện 1 câu. Chọn đáp án là hiện kết quả ngay, rồi tự
                sang câu tiếp theo.
              </div>
            </div>
          </div>
          <div class="stats">
            <div class="stat"><b id="statTotal">0</b><span>Tổng câu</span></div>
            <div class="stat">

            </div>
            <div class="stat"><b id="statDone">0</b><span>Đã làm</span></div>
            <div class="stat"><b id="statCorrect">0</b><span>Đúng</span></div>
          </div>
        </div>

        <div class="controls">
          <div class="panel">
            <input
              id="searchInput"
              type="search"
              placeholder="Tìm câu hỏi hoặc đáp án..."
            />
          </div>
          <div class="panel">
            <select id="sourceFilter">
              <option value="all">Tất cả nguồn</option>
              <option value="OSG">Chỉ OSG</option>
              <option value="NWC">Chỉ NWC</option>
            </select>
          </div>
          <div class="panel">
            <select id="statusFilter">
              <option value="all">Tất cả trạng thái</option>
              <option value="unanswered">Chưa làm</option>
              <option value="answered">Đã làm</option>
              <option value="wrong">Chỉ câu sai</option>
            </select>
          </div>
        </div>

        <div class="bar-row">
          <span id="positionText">Câu 1 / 1</span>
          <span id="progressText">Tiến độ: 0 / 0</span>
        </div>
        <div class="progress"><div id="progressFill"></div></div>
      </div>

      <div id="stage" class="stage"></div>

      <div class="footer-note">
        Câu nhiều đáp án sẽ tự chấm khi bạn chọn đủ số lượng cần chọn.
      </div>
    </div>

      const STORAGE_KEY = "quiz-osg-nwc-sequential-v2";
      const AUTO_NEXT_DELAY = 5000;

      const state = {
        answers: {},
        locked: {},
        search: "",
        source: "all",
        status: "all",
        currentIndex: 0,
      };

      let autoNextTimer = null;

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          Object.assign(state, saved || {});
        } catch (e) {
          console.warn("Không đọc được dữ liệu lưu.", e);
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function normalizeText(text) {
        return String(text || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/\p{Diacritic}/gu, "");
      }

      function getQuestionById(id) {
        return QUESTIONS.find((q) => q.id === id);
      }

      function arraysEqualAsSet(a, b) {
        if (a.length !== b.length) return false;
        return [...a].sort().join("|") === [...b].sort().join("|");
      }

      function isLocked(q) {
        return !!state.locked[q.id];
      }

      function isAnswered(q) {
        const ans = state.answers[q.id] || [];
        return Array.isArray(ans) && ans.length > 0 && isLocked(q);
      }

      function isCorrect(q) {
        const ans = state.answers[q.id] || [];
        return isLocked(q) && arraysEqualAsSet(ans, q.correct);
      }

      function getFilteredQuestions() {
        let list = [...QUESTIONS];

        if (state.source !== "all") {
          list = list.filter((q) => q.source === state.source);
        }

        if (state.search.trim()) {
          const needle = normalizeText(state.search.trim());
          list = list.filter((q) => {
            const bag = [
              q.question,
              ...q.options.map((o) => o.text),
              ...q.options.map((o) => o.letter),
            ].join(" ");
            return normalizeText(bag).includes(needle);
          });
        }

        if (state.status === "unanswered") {
          list = list.filter((q) => !isAnswered(q));
        } else if (state.status === "answered") {
          list = list.filter((q) => isAnswered(q));
        } else if (state.status === "wrong") {
          list = list.filter((q) => isAnswered(q) && !isCorrect(q));
        }

        return list;
      }

      function chooseInputType(q) {
        return q.multi ? "checkbox" : "radio";
      }

      function helperText(q) {
        return q.correctCount > 1
          ? `Chọn ${q.correctCount} đáp án`
          : "Chọn 1 đáp án";
      }

      function summary() {
        let done = 0,
          correct = 0;
        for (const q of QUESTIONS) {
          if (isAnswered(q)) done++;
          if (isCorrect(q)) correct++;
        }
        return { done, correct, total: QUESTIONS.length };
      }

      function clampIndex(filtered) {
        if (!filtered.length) {
          state.currentIndex = 0;
          return;
        }
        if (state.currentIndex >= filtered.length)
          state.currentIndex = filtered.length - 1;
        if (state.currentIndex < 0) state.currentIndex = 0;
      }

      function updateStats(filtered) {
        const s = summary();
        document.getElementById("statTotal").textContent = QUESTIONS.length;
        document.getElementById("statFiltered").textContent = filtered.length;
        document.getElementById("statDone").textContent = s.done;
        document.getElementById("statCorrect").textContent = s.correct;
        document.getElementById("progressText").textContent =
          `Tiến độ: ${s.done} / ${QUESTIONS.length}`;
        document.getElementById("progressFill").style.width =
          `${QUESTIONS.length ? (s.done / QUESTIONS.length) * 100 : 0}%`;
        document.getElementById("searchInput").value = state.search || "";
        document.getElementById("sourceFilter").value = state.source || "all";
        document.getElementById("statusFilter").value = state.status || "all";
      }

      function optionClass(q, letter) {
        if (!isLocked(q)) return "";
        const picked = (state.answers[q.id] || []).includes(letter);
        const correct = q.correct.includes(letter);
        if (correct) return "correct";
        if (picked && !correct) return "wrong";
        return "";
      }

      function resultHTML(q) {
        if (!isLocked(q)) return "";
        const right = isCorrect(q);
        const yourAns =
          (state.answers[q.id] || [])
            .map((letter) => {
              const found = q.options.find((o) => o.letter === letter);
              return `${letter}${found ? ". " + found.text : ""}`;
            })
            .join(" | ") || "Chưa chọn";

        const correctLines = q.correct
          .map((letter) => {
            const found = q.options.find((o) => o.letter === letter);
            return `<div><b>${letter}.</b> ${found ? found.text : ""}</div>`;
          })
          .join("");

        return `
        <div class="result show ${right ? "correct" : "wrong"}">
          <div><b>${right ? "✓ Chính xác" : "✗ Chưa đúng"}</b></div>
          <div><span style="color:var(--muted)">Bạn chọn:</span> ${yourAns}</div>
          <div style="margin-top:8px;"><span style="color:var(--muted)">Đáp án đúng:</span></div>
          <div>${correctLines}</div>
          <div class="mini-note">${hasNextFiltered() ? "Đang chuyển sang câu tiếp theo..." : "Đây là câu cuối trong bộ lọc hiện tại."}</div>
        </div>
      `;
      }

      function hasNextFiltered() {
        const filtered = getFilteredQuestions();
        clampIndex(filtered);
        return state.currentIndex < filtered.length - 1;
      }

      function render() {
        const filtered = getFilteredQuestions();
        clampIndex(filtered);
        updateStats(filtered);

        const stage = document.getElementById("stage");
        if (!filtered.length) {
          document.getElementById("positionText").textContent =
            "Không có câu phù hợp";
          stage.innerHTML = `<div class="empty">Không có câu hỏi phù hợp với bộ lọc hiện tại. Hãy đổi bộ lọc hoặc từ khóa tìm kiếm.</div>`;
          saveState();
          return;
        }

        const q = filtered[state.currentIndex];
        const globalIndex = QUESTIONS.findIndex((item) => item.id === q.id) + 1;
        const answers = state.answers[q.id] || [];
        const locked = isLocked(q);

        document.getElementById("positionText").textContent =
          `Câu ${state.currentIndex + 1} / ${filtered.length} · Mã ${q.id}`;

        stage.innerHTML = `
        <article class="card" id="question-card">
          <div class="topline">
            <div class="badges">
              <span class="badge">Mã câu ${q.id}</span>
              <span class="badge ${q.source.toLowerCase()}">${q.source}</span>
              <span class="badge">${helperText(q)}</span>
              <span class="badge">${locked ? (isCorrect(q) ? "Đúng" : "Sai") : "Chưa chấm"}</span>
            </div>
            <div class="sub">Vị trí gốc: ${globalIndex} / ${QUESTIONS.length}</div>
          </div>

          <div class="qtext">${q.question}</div>
          <div class="helper" id="helperLine">${q.multi ? `Hãy chọn đủ ${q.correctCount} đáp án.` : "Bấm vào 1 đáp án để chấm ngay."}</div>

          ${q.image_data ? `<img class="qimage" src="${q.image_data}" alt="Hình minh họa câu ${q.id}" />` : ""}

          <div class="options">
            ${q.options
              .map(
                (opt) => `
              <label class="opt ${optionClass(q, opt.letter)} ${locked ? "disabled" : ""}">
                <input
                  type="${chooseInputType(q)}"
                  name="q_${q.id}"
                  value="${opt.letter}"
                  data-qid="${q.id}"
                  ${answers.includes(opt.letter) ? "checked" : ""}
                  ${locked ? "disabled" : ""}
                />
                <span class="opt-letter">${opt.letter}</span>
                <span class="opt-text">${opt.text}</span>
              </label>
            `,
              )
              .join("")}
          </div>

          ${resultHTML(q)}

          <div class="nav">
            <button class="secondary" id="prevBtn" ${state.currentIndex <= 0 ? "disabled" : ""}>← Câu trước</button>
            <button class="secondary" id="nextBtn" ${state.currentIndex >= filtered.length - 1 ? "disabled" : ""}>Câu tiếp theo →</button>
            <button class="danger" id="resetBtn">Làm lại từ đầu</button>
          </div>
        </article>
      `;

        bindCardEvents(q, filtered);
        saveState();
      }

      function queueNext() {
        clearTimeout(autoNextTimer);
        const filtered = getFilteredQuestions();
        clampIndex(filtered);
        if (state.currentIndex >= filtered.length - 1) return;
        autoNextTimer = setTimeout(() => {
          const latest = getFilteredQuestions();
          clampIndex(latest);
          if (state.currentIndex < latest.length - 1) {
            state.currentIndex += 1;
            saveState();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        }, AUTO_NEXT_DELAY);
      }

      function finalizeQuestion(qid) {
        state.locked[qid] = true;
        saveState();
        render();
        queueNext();
      }

      function onPickSingle(q, value) {
        state.answers[q.id] = [value];
        finalizeQuestion(q.id);
      }

      function onPickMulti(q) {
        const checked = [
          ...document.querySelectorAll(`input[data-qid="${q.id}"]:checked`),
        ].map((el) => el.value);
        state.answers[q.id] = checked;
        saveState();

        const helper = document.getElementById("helperLine");
        if (helper && !isLocked(q)) {
          if (checked.length < q.correctCount) {
            helper.textContent = `Đã chọn ${checked.length} / ${q.correctCount} đáp án.`;
          } else if (checked.length > q.correctCount) {
            helper.textContent = `Bạn đã chọn quá ${q.correctCount} đáp án. Hãy bỏ bớt để chấm.`;
          } else {
            helper.textContent = "Đã đủ số lượng đáp án, đang chấm...";
          }
        }

        if (checked.length === q.correctCount) {
          finalizeQuestion(q.id);
        }
      }

      function bindCardEvents(q, filtered) {
        document
          .querySelectorAll(`input[data-qid="${q.id}"]`)
          .forEach((input) => {
            input.addEventListener("change", (e) => {
              if (isLocked(q)) return;
              if (!q.multi) {
                onPickSingle(q, e.target.value);
              } else {
                onPickMulti(q);
              }
            });
          });

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const resetBtn = document.getElementById("resetBtn");

        if (prevBtn)
          prevBtn.addEventListener("click", () => {
            clearTimeout(autoNextTimer);
            state.currentIndex = Math.max(0, state.currentIndex - 1);
            saveState();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });

        if (nextBtn)
          nextBtn.addEventListener("click", () => {
            clearTimeout(autoNextTimer);
            state.currentIndex = Math.min(
              filtered.length - 1,
              state.currentIndex + 1,
            );
            saveState();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });

        if (resetBtn)
          resetBtn.addEventListener("click", () => {
            const ok = confirm(
              "Bạn có chắc muốn xóa toàn bộ đáp án và làm lại từ đầu?",
            );
            if (!ok) return;
            clearTimeout(autoNextTimer);
            state.answers = {};
            state.locked = {};
            state.currentIndex = 0;
            saveState();
            render();
          });
      }

      function attachControls() {
        document
          .getElementById("searchInput")
          .addEventListener("input", (e) => {
            clearTimeout(autoNextTimer);
            state.search = e.target.value;
            state.currentIndex = 0;
            saveState();
            render();
          });

        document
          .getElementById("sourceFilter")
          .addEventListener("change", (e) => {
            clearTimeout(autoNextTimer);
            state.source = e.target.value;
            state.currentIndex = 0;
            saveState();
            render();
          });

        document
          .getElementById("statusFilter")
          .addEventListener("change", (e) => {
            clearTimeout(autoNextTimer);
            state.status = e.target.value;
            state.currentIndex = 0;
            saveState();
            render();
          });
      }

      loadState();
      attachControls();
      render();
    </script>
  </body>
</html>
